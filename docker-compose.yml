version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: reconx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reconx_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: reconx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: reconx_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env.example

volumes:
  postgres_data: